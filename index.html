<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salvatore - Player & WhatsApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #070a13 0%, #0f172a 100%);
      padding: 20px;
    }

    /* Box Salvatore */
    .box-salvatore {
      position: relative;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 35px 25px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    /* Botón de WhatsApp - Posición Absoluta */
    .whatsapp-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 45px;
      height: 45px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      z-index: 10;
    }

    .whatsapp-btn:hover {
      transform: scale(1.15) rotate(10deg);
      box-shadow: 0 6px 15px rgba(37, 211, 102, 0.5);
    }

    .whatsapp-btn svg { width: 25px; height: 25px; fill: white; }

    .box-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 25px;
      letter-spacing: 2px;
      background: linear-gradient(45deg, #818cf8, #e0e7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    /* Botonera */
    .button-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .btn:hover { transform: translateY(-2px); }

    .btn-radiomar { background: linear-gradient(135deg, #f97316 0%, #c2410c 100%); }
    .btn-exitosa { background: linear-gradient(135deg, #06b6d4 0%, #0369a1 100%); }
    .btn-america { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }

    /* Reproductor */
    .player-container {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      margin-top: 15px;
      display: none;
    }

    .video-frame-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      background: #000;
    }

    .video-frame-wrapper iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
    }

    .btn-stop {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.4);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.75rem;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-toggle-audio {
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-toggle-audio:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>

  <div class="box-salvatore">
    <a href="https://wa.me/51963845681" target="_blank" class="whatsapp-btn" title="Contactar por WhatsApp">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 21.602c-2.64 0-5.28-.68-7.56-1.97l-.54-.32-5.6 1.47 1.49-5.46-.35-.57C1.5 11.23 1.5 8.35 3.32 6.15c1.82-2.2 4.79-3.41 7.89-3.41 2.11 0 4.12.54 5.92 1.61 1.8 1.07 3.16 2.59 3.96 4.45.8 1.86.99 3.86.55 5.75-.44 1.89-1.47 3.56-3.03 4.85-1.56 1.3-3.49 1.99-5.6 1.99z"/></svg>
    </a>

    <h1 class="box-title">Salvatore</h1>
    
    <div class="button-group">
      <button class="btn btn-radiomar" onclick="playAudio('https://stream.crpradios.pe/radiomar.mp3', 'Radio Mar Plus')">
        <span>Radio Mar Plus</span>
      </button>
      <button class="btn btn-exitosa" onclick="playAudio('https://streaming.exitosa.pe/radio/8000/exitosa.mp3', 'Radio Exitosa')">
        <span>Radio Exitosa</span>
      </button>
      <button class="btn btn-america" onclick="playVideo('https://tvgo.americatv.com.pe/', 'América TV En Vivo')">
        <span>América TV en vivo</span>
      </button>
    </div>

    <div id="playerContainer" class="player-container">
      <div id="playerTitle" style="color: #38bdf8; font-size: 0.9rem; margin-bottom: 12px; font-weight: 600;">Reproduciendo</div>
      <div id="mediaSpace"></div>
      <button class="btn-stop" onclick="stopAll()">Cerrar</button>
    </div>
  </div>

  <script>
    // Variable global para controlar el reproductor de audio
    window.currentAudio = null;

    function stopAll() {
      if (window.currentAudio) { 
        window.currentAudio.pause(); 
        window.currentAudio = null; 
      }
      document.getElementById('mediaSpace').innerHTML = '';
      document.getElementById('playerContainer').style.display = 'none';
    }

    function playAudio(url, name) {
      stopAll();
      document.getElementById('playerTitle').textContent = "Escuchando: " + name;
      document.getElementById('playerContainer').style.display = 'block';
      
      // Creamos la interfaz con la función toggle() correctamente enlazada
      document.getElementById('mediaSpace').innerHTML = `
        <div style="margin-bottom: 10px;">
          <button class="btn-toggle-audio" id="btnToggle" onclick="toggleAudio()">Pausar ❚❚</button>
        </div>
      `;
      
      window.currentAudio = new Audio(url);
      window.currentAudio.play().catch(err => {
        console.log("Auto-play bloqueado por el navegador, requiere interacción.");
        document.getElementById('btnToggle').textContent = "Reproducir ▶";
      });
    }

    // Función corregida para pausar y reanudar la música en vivo
    function toggleAudio() {
      const btn = document.getElementById('btnToggle');
      if (window.currentAudio) {
        if (window.currentAudio.paused) {
          window.currentAudio.play();
          btn.textContent = "Pausar ❚❚";
        } else {
          window.currentAudio.pause();
          btn.textContent = "Reproducir ▶";
        }
      }
    }

    function playVideo(url, name) {
      stopAll();
      document.getElementById('playerTitle').textContent = "Viendo: " + name;
      document.getElementById('playerContainer').style.display = 'block';
      document.getElementById('mediaSpace').innerHTML = `
        <div class="video-frame-wrapper">
          <iframe src="${url}" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
      `;
    }
  </script>
</body>
</html>
