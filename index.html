<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salvatore - Player & WhatsApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #070a13 0%, #0f172a 100%);
      padding: 20px;
    }

    /* Box Salvatore */
    .box-salvatore {
      position: relative;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 35px 25px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    /* Botón de WhatsApp */
    .whatsapp-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 45px;
      height: 45px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      z-index: 10;
    }

    .whatsapp-btn:hover {
      transform: scale(1.15) rotate(10deg);
      box-shadow: 0 6px 15px rgba(37, 211, 102, 0.5);
    }

    .whatsapp-btn svg { width: 25px; height: 25px; fill: white; }

    .box-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 25px;
      letter-spacing: 2px;
      background: linear-gradient(45deg, #818cf8, #e0e7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    /* Botonera */
    .button-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }

    .radio-grid, .tv-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 6px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .btn-square {
      aspect-ratio: 1 / 1;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      font-size: 0.85rem;
      text-align: center;
    }

    .btn-square span.icon { font-size: 1.6rem; }
    .btn:hover { transform: translateY(-2px); }

    /* Colores de los botones */
    .btn-rpp { background: linear-gradient(135deg, #0d3b66 0%, #001e3d 100%); }
    .btn-ritmo { background: linear-gradient(135deg, #ec4899 0%, #be185d 100%); }
    .btn-garden { background: linear-gradient(135deg, #10b981 0%, #047857 100%); }
    .btn-la90 { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); } /* Actualizado a La 90 */
    .btn-america { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
    .btn-famelack { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); }

    /* Reproductor / Contenedor Embebido */
    .player-container {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px;
      margin-top: 15px;
      display: none;
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .video-frame-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      background: #000;
    }

    .video-frame-wrapper.large-frame {
      padding-bottom: 85%; 
    }

    .video-frame-wrapper iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
    }

    .audio-wrapper {
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      text-align: center;
    }

    .audio-wrapper audio {
      width: 100%;
      max-width: 400px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .btn-stop {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.4);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.2s;
      width: 100%;
    }

    .btn-stop:hover {
      background: rgba(239, 68, 68, 0.4);
      color: #fff;
    }

    .fallback-link {
      display: block;
      margin-top: 10px;
      color: #38bdf8;
      font-size: 0.75rem;
      text-decoration: underline;
      text-align: center;
    }
    
    .fallback-link:hover { color: #7dd3fc; }
  </style>
</head>
<body>

  <div class="box-salvatore">
    <!-- Botón WhatsApp -->
    <a href="https://wa.me/51963845681" target="_blank" class="whatsapp-btn" title="Contactar por WhatsApp">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 21.602c-2.64 0-5.28-.68-7.56-1.97l-.54-.32-5.6 1.47 1.49-5.46-.35-.57C1.5 11.23 1.5 8.35 3.32 6.15c1.82-2.2 4.79-3.41 7.89-3.41 2.11 0 4.12.54 5.92 1.61 1.8 1.07 3.16 2.59 3.96 4.45.8 1.86.99 3.86.55 5.75-.44 1.89-1.47 3.56-3.03 4.85-1.56 1.3-3.49 1.99-5.6 1.99z"/></svg>
    </a>

    <h1 class="box-title">Salvatore</h1>
    
    <div class="button-group">
      <!-- CUADRÍCULA 2x2 PARA LAS RADIOS -->
      <div class="radio-grid">
        <!-- 1. RPP (Stream directo de audio) -->
        <button class="btn btn-square btn-rpp" onclick="playMedia('https://stream.zeno.fm/0r0xa792kwzuv', 'RPP Noticias', true)">
          <span class="icon">📻</span>
          <span>RPP</span>
        </button>

        <!-- 2. Radio Ritmo Romántica (Stream directo de audio) -->
        <button class="btn btn-square btn-ritmo" onclick="playMedia('https://stream.crpradios.pe/ritmoromantica.mp3', 'Ritmo Romántica', true)">
          <span class="icon">💝</span>
          <span>Ritmo Romántica</span>
        </button>

        <!-- 3. Radio Garden (Web embebida) -->
        <button class="btn btn-square btn-garden" onclick="playMedia('https://radio.garden/', 'Radio Garden', false, true)">
          <span class="icon">🌍</span>
          <span>Radio Garden</span>
        </button>

        <!-- 4. La Noventa Entera (Web embebida) -->
        <button class="btn btn-square btn-la90" onclick="playMedia('https://lanoventera.com/', 'La Noventa Entera', false)">
          <span class="icon">🎵</span>
          <span>La Noventa Entera</span>
        </button>
      </div>

      <!-- CUADRÍCULA PARA LOS CANALES DE TELEVISIÓN -->
      <div class="tv-grid">
        <!-- América TV -->
        <button class="btn btn-america" onclick="playMedia('https://tvgo.americatv.com.pe/', 'América TV En Vivo', false)">
          <span>América TV en vivo</span>
        </button>

        <!-- Famelack TV -->
        <button class="btn btn-famelack" onclick="playMedia('https://famelack.com/', 'Famelack Live TV', false)">
          <span>Famelack TV</span>
        </button>
      </div>
    </div>

    <div id="playerContainer" class="player-container">
      <div id="playerTitle" style="color: #38bdf8; font-size: 0.95rem; font-weight: 600; margin-bottom: 15px;">Cargando...</div>
      <div id="mediaSpace"></div>
      <button class="btn-stop" onclick="stopAll()">⏹ Detener y Cerrar</button>
    </div>
  </div>

  <script>
    function stopAll() {
      const mediaSpace = document.getElementById('mediaSpace');
      mediaSpace.innerHTML = ''; // Destruye el iframe o audio para detener la reproducción
      document.getElementById('playerContainer').style.display = 'none';
      document.getElementById('playerTitle').textContent = 'Cargando...';
    }
    
    /**
     * Función unificada para cargar transmisiones.
     * @param {string} url - La URL del stream o sitio web.
     * @param {string} name - Nombre a mostrar.
     * @param {boolean} isAudio - Si es true, usa la etiqueta <audio> nativa (mucho más fiable para radios).
     * @param {boolean} isLarge - Si es true, aplica un aspecto más alto (para Radio Garden).
     */
    function playMedia(url, name, isAudio, isLarge = false) {
      stopAll();
      document.getElementById('playerTitle').textContent = `▶ Reproduciendo: ${name}`;
      document.getElementById('playerContainer').style.display = 'block';
      
      const mediaSpace = document.getElementById('mediaSpace');
      
      if (isAudio) {
        // Usar <audio> nativo para streams MP3/HLS. Es 100% fiable y no lo bloquean los navegadores.
        mediaSpace.innerHTML = `
          <div class="audio-wrapper">
            <p style="color: #cbd5e1; font-size: 0.85rem; margin-bottom: 10px;">Stream de audio en vivo</p>
            <audio controls autoplay name="media">
              <source src="${url}" type="audio/mpeg">
              <source src="${url}" type="audio/aac">
              Tu navegador no soporta la reproducción de audio HTML5.
            </audio>
            <p style="color: #94a3b8; font-size: 0.75rem; margin-top: 12px;">💡 Si no inicia automáticamente, haz clic en el botón "Play" del reproductor.</p>
          </div>
        `;
      } else {
        // Usar <iframe> para sitios web completos (Radio Garden, TV, Famelack, La Noventa Entera)
        const frameClass = isLarge ? "video-frame-wrapper large-frame" : "video-frame-wrapper";
        mediaSpace.innerHTML = `
          <div class="${frameClass}">
            <iframe 
              src="${url}" 
              allow="autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" 
              allowfullscreen 
              sandbox="allow-same-origin allow-scripts allow-popups allow-forms">
            </iframe>
          </div>
          <a href="${url}" target="_blank" class="fallback-link">
            ⚠️ Si la pantalla se queda en blanco, haz clic aquí para abrir en una nueva pestaña
          </a>
        `;
      }
    }
  </script>
</body>
</html>
