<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FANTOMS - Player & WhatsApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #070a13 0%, #0f172a 100%);
      padding: 20px;
    }

    .box-salvatore {
      position: relative;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 35px 25px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .whatsapp-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 45px;
      height: 45px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      z-index: 10;
    }

    .whatsapp-btn:hover {
      transform: scale(1.15) rotate(10deg);
      box-shadow: 0 6px 15px rgba(37, 211, 102, 0.5);
    }

    .whatsapp-btn svg { width: 25px; height: 25px; fill: white; }

    .taxi-btn {
      position: fixed;
      bottom: 24px;
      right: 20px;
      z-index: 15;
      display: flex;
      align-items: center;
      gap: 8px;
      background: repeating-linear-gradient(135deg, #FFC107 0 14px, #111 14px 16px);
      color: #0A0D12;
      text-decoration: none;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 12px 18px 12px 14px;
      border-radius: 999px;
      box-shadow: 0 10px 24px -8px rgba(255, 193, 7, 0.55), 0 0 0 2px rgba(0,0,0,0.5);
      animation: taxiPulse 1.8s ease-in-out infinite;
    }

    .taxi-btn span.taxi-text {
      background: #111;
      color: #FFC107;
      padding: 3px 10px;
      border-radius: 999px;
    }

    .taxi-btn:hover { animation-play-state: paused; transform: scale(1.05); }

    @keyframes taxiPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .box-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 25px;
      letter-spacing: 2px;
      background: linear-gradient(45deg, #818cf8, #e0e7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    .button-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }

    .radio-grid, .tv-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 6px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .btn-square {
      aspect-ratio: 1 / 1;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      font-size: 0.85rem;
      text-align: center;
      position: relative;
    }

    .btn-square span.icon { font-size: 1.6rem; }
    .btn:hover { transform: translateY(-2px); }

    .external-badge {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 0.7rem;
      opacity: 0.7;
    }

    .btn-rpp { background: linear-gradient(135deg, #0d3b66 0%, #001e3d 100%); }
    .btn-ritmo { background: linear-gradient(135deg, #ec4899 0%, #be185d 100%); }
    .btn-garden { background: linear-gradient(135deg, #10b981 0%, #047857 100%); }
    .btn-la90 { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    .btn-america { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
    .btn-famelack { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); }

    .player-container {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px;
      margin-top: 15px;
      display: none;
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .video-frame-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      background: #000;
    }

    .video-frame-wrapper iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
    }

    .audio-wrapper {
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      text-align: center;
    }

    .audio-wrapper audio {
      width: 100%;
      max-width: 400px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .error-box {
      display: none;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: 10px;
      padding: 14px;
      margin-top: 12px;
      font-size: 0.8rem;
      color: #fca5a5;
    }

    .error-box a {
      display: inline-block;
      margin-top: 8px;
      color: #38bdf8;
      font-weight: 600;
      text-decoration: none;
    }

    .btn-stop {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.4);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.2s;
      width: 100%;
    }

    .btn-stop:hover {
      background: rgba(239, 68, 68, 0.4);
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="box-salvatore">
    <a href="https://wa.me/51963845681" target="_blank" class="whatsapp-btn" title="Contactar por WhatsApp">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12 21.602c-2.64 0-5.28-.68-7.56-1.97l-.54-.32-5.6 1.47 1.49-5.46-.35-.57C1.5 11.23 1.5 8.35 3.32 6.15c1.82-2.2 4.79-3.41 7.89-3.41 2.11 0 4.12.54 5.92 1.61 1.8 1.07 3.16 2.59 3.96 4.45.8 1.86.99 3.86.55 5.75-.44 1.89-1.47 3.56-3.03 4.85-1.56 1.3-3.49 1.99-5.6 1.99z"/></svg>
    </a>

    <h1 class="box-title">FANTOMS</h1>
    <p style="color:#94a3b8; font-size:0.8rem; margin-top:-18px; margin-bottom:20px; letter-spacing:0.5px;">Escucha la radio. Descubre la música.</p>

    <div class="button-group">
      <div class="radio-grid">
        <!-- 1. RPP: se busca el stream real y vivo vía Radio-Browser API -->
        <button class="btn btn-square btn-rpp" onclick="playViaRadioBrowser('RPP', 'RPP Noticias', 'https://www.rpp.pe/')">
          <span class="icon">📻</span>
          <span>RPP</span>
        </button>

        <!-- 2. Perú Radio: lista 50 emisoras peruanas reales para elegir -->
        <button class="btn btn-square btn-ritmo" onclick="showPeruRadioList()">
          <span class="icon">🇵🇪</span>
          <span>Perú Radio</span>
        </button>

        <!-- 3. Radio Garden: bloquea iframes (X-Frame-Options) -> abre en pestaña nueva -->
        <button class="btn btn-square btn-garden" onclick="openExternal('https://radio.garden/')">
          <span class="icon">🌍</span>
          <span>Radio Garden</span>
          <span class="external-badge">↗</span>
        </button>

        <!-- 4. CNN Radio: noticias en inglés, un clic -->
        <button class="btn btn-square btn-la90" onclick="playViaRadioBrowser('CNN', 'CNN Radio', 'https://edition.cnn.com/audio', null)">
          <span class="icon">📰</span>
          <span>CNN Radio</span>
        </button>
      </div>

      <div class="tv-grid">
        <!-- América TV: bloquea iframes -> abre en pestaña nueva -->
        <button class="btn btn-america" onclick="openExternal('https://tvgo.americatv.com.pe/')">
          <span>América TV en vivo</span>
          <span class="external-badge">↗</span>
        </button>

        <!-- Famelack TV: bloquea iframes -> abre en pestaña nueva -->
        <button class="btn btn-famelack" onclick="openExternal('https://famelack.com/')">
          <span>Famelack TV</span>
          <span class="external-badge">↗</span>
        </button>
      </div>
    </div>

    <div id="playerContainer" class="player-container">
      <div id="playerTitle" style="color: #38bdf8; font-size: 0.95rem; font-weight: 600; margin-bottom: 15px;">Cargando...</div>
      <div id="mediaSpace"></div>
      <div id="errorBox" class="error-box"></div>
      <button class="btn-stop" onclick="stopAll()">⏹ Detener y Cerrar</button>
    </div>
  </div>

  <a href="https://rutasya.netlify.app/" target="_blank" rel="noopener" class="taxi-btn">
    🚕 <span class="taxi-text">Pide tu Taxi</span>
  </a>

  <script>
    // ===== Sistema de cuñas publicitarias (rotación ponderada por lo que paga cada anunciante) =====
    // Por defecto está VACÍO (AD_SLOTS = []) para que las radios sigan sonando instantáneo.
    // Cuando tengas tus mp3 reales subidos, descomenta y llena este arreglo con tus 20 anunciantes.
    // "peso" = precio en soles que paga cada uno (S/8, S/10, S/19...) -> entre más paga, más suena.
    // ⚠️ IMPORTANTE: audioUrl debe ser un link REAL que exista (mp3 subido a Netlify/Supabase Storage).
    // Si dejas un link falso/de ejemplo, esa cuña fallará cada vez y demorará el inicio de la radio.
    const AD_SLOTS = [
      // { name: "Anunciante Básico (S/8)",    audioUrl: "https://tu-dominio.netlify.app/cunas/basico.mp3",   peso: 8  },
      // { name: "Anunciante Estándar (S/10)", audioUrl: "https://tu-dominio.netlify.app/cunas/estandar.mp3", peso: 10 },
      // { name: "Anunciante Premium (S/19)",  audioUrl: "https://tu-dominio.netlify.app/cunas/premium.mp3",  peso: 19 },
    ];

    const AD_INTERVAL_MINUTES = 15; // cada cuánto interrumpe con una cuña mientras sigue escuchando

    // Arma una "bolsa" con cada anunciante repetido según su peso, y saca uno al azar.
    // Con pesos 8/10/19, el Premium sale ~2.4x más seguido que el Básico — proporcional a lo que paga.
    function pickWeightedAd() {
      if (AD_SLOTS.length === 0) return null;
      const bag = [];
      AD_SLOTS.forEach((ad) => { for (let i = 0; i < ad.peso; i++) bag.push(ad); });
      return bag[Math.floor(Math.random() * bag.length)];
    }

    let sessionAdPlayed = false;   // cuña de bienvenida: solo 1 vez por sesión (en memoria, no persiste)
    let adRotationTimer = null;
    let activeStreamAudio = null;  // referencia al <audio> del stream en vivo que está sonando

    function clearAdRotation() {
      if (adRotationTimer) { clearInterval(adRotationTimer); adRotationTimer = null; }
    }

    function scheduleAdRotation() {
      clearAdRotation();
      adRotationTimer = setInterval(() => {
        if (activeStreamAudio && !activeStreamAudio.paused) playInterstitialAd();
      }, AD_INTERVAL_MINUTES * 60 * 1000);
    }

    // Interrumpe el stream en vivo, suena una cuña, y retoma el stream donde iba.
    function playInterstitialAd() {
      const ad = pickWeightedAd();
      if (!ad || !activeStreamAudio) return;
      activeStreamAudio.pause();
      document.getElementById('playerTitle').textContent = `📢 ${ad.name}`;
      const adAudio = new Audio(ad.audioUrl);
      const resume = () => {
        document.getElementById('playerTitle').textContent = `▶ En vivo`;
        activeStreamAudio.play().catch(() => {});
      };
      adAudio.addEventListener('ended', resume);
      adAudio.addEventListener('error', resume);
      adAudio.play().catch(resume);
    }

    // Cuña de bienvenida: suena 1 sola vez por sesión, antes de la primera radio que se toque.
    function maybePlayPreRoll(onDone) {
      if (sessionAdPlayed || AD_SLOTS.length === 0) { onDone(); return; }
      sessionAdPlayed = true;
      const ad = pickWeightedAd();
      if (!ad) { onDone(); return; }
      document.getElementById('playerTitle').textContent = `📢 Publicidad`;
      document.getElementById('mediaSpace').innerHTML = `<div class="audio-wrapper"><p style="color:#94a3b8; font-size:0.85rem;">📢 ${ad.name}</p></div>`;
      const adAudio = new Audio(ad.audioUrl);
      const proceed = () => onDone();
      adAudio.addEventListener('ended', proceed);
      adAudio.addEventListener('error', proceed);
      adAudio.play().catch(proceed); // si el navegador bloquea el autoplay, pasa directo al stream
    }

    function stopAll() {
      clearAdRotation();
      activeStreamAudio = null;
      document.getElementById('mediaSpace').innerHTML = '';
      document.getElementById('errorBox').style.display = 'none';
      document.getElementById('playerContainer').style.display = 'none';
      document.getElementById('playerTitle').textContent = 'Cargando...';
    }

    // Abre sitios que no se pueden embeber por seguridad (X-Frame-Options / CSP)
    function openExternal(url) {
      window.open(url, '_blank', 'noopener');
    }

    // Servidores espejo de la API de Radio-Browser (radio-browser.info).
    // Es una base de datos comunitaria de streams reales, verificados en vivo,
    // por eso resuelve el problema de las URLs de stream que caducan.
    const RADIO_BROWSER_SERVERS = [
      "https://de1.api.radio-browser.info",
      "https://de2.api.radio-browser.info",
      "https://at1.api.radio-browser.info",
      "https://nl1.api.radio-browser.info",
    ];

    async function fetchStationFromRadioBrowser(name, countrycode = "PE") {
      const params = new URLSearchParams({
        name,
        limit: "10",
        hidebroken: "true",
        order: "clickcount",
        reverse: "true",
      });
      if (countrycode) params.set("countrycode", countrycode);
      for (const server of RADIO_BROWSER_SERVERS) {
        try {
          const res = await fetch(`${server}/json/stations/search?${params.toString()}`);
          if (!res.ok) continue;
          const data = await res.json();
          const valid = (data || []).filter(s => s.url_resolved);
          if (valid.length > 0) return valid[0];
        } catch (e) {
          // probamos el siguiente servidor espejo
        }
      }
      return null;
    }

    async function fetchTopStations(countrycode, limit) {
      const params = new URLSearchParams({
        limit: String(limit),
        hidebroken: "true",
        order: "clickcount",
        reverse: "true",
        countrycode,
      });
      for (const server of RADIO_BROWSER_SERVERS) {
        try {
          const res = await fetch(`${server}/json/stations/search?${params.toString()}`);
          if (!res.ok) continue;
          const data = await res.json();
          const valid = (data || []).filter(s => s.url_resolved);
          if (valid.length > 0) return valid;
        } catch (e) {
          // probamos el siguiente servidor espejo
        }
      }
      return [];
    }

    /**
     * Muestra una lista de 50 emisoras peruanas reales para elegir con un clic.
     */
    let peruStationList = [];
    async function showPeruRadioList() {
      stopAll();
      document.getElementById('playerTitle').textContent = `🇵🇪 Perú Radio`;
      document.getElementById('playerContainer').style.display = 'block';

      const mediaSpace = document.getElementById('mediaSpace');
      mediaSpace.innerHTML = `<div class="audio-wrapper"><p style="color:#94a3b8; font-size:0.85rem;">Cargando 50 emisoras peruanas…</p></div>`;

      peruStationList = await fetchTopStations("PE", 50);

      if (peruStationList.length === 0) {
        mediaSpace.innerHTML = `<div class="audio-wrapper"><p style="color:#fca5a5; font-size:0.85rem;">No se pudo cargar la lista de emisoras. Intenta de nuevo.</p></div>`;
        return;
      }

      const listHtml = peruStationList.map((s, i) => `
        <button onclick="playFromPeruList(${i})" style="
          display:flex; align-items:center; justify-content:space-between;
          width:100%; text-align:left; background: rgba(255,255,255,0.04);
          border:1px solid rgba(255,255,255,0.08); border-radius:10px;
          padding:10px 12px; margin-bottom:6px; color:#EDEFF3; font-size:0.85rem;
          cursor:pointer;">
          <span>${s.name}</span>
          <span style="color:#38bdf8; font-size:0.75rem;">▶</span>
        </button>
      `).join('');

      mediaSpace.innerHTML = `
        <div style="position:relative;">
          <button onclick="stopAll()" title="Cerrar" style="
            position:absolute; top:-6px; right:-6px; z-index:2;
            width:26px; height:26px; border-radius:50%;
            background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.4);
            color:#f87171; font-size:0.85rem; font-weight:700; line-height:1;
            cursor:pointer; display:flex; align-items:center; justify-content:center;">✕</button>
          <div style="max-height:340px; overflow-y:auto; padding-right:4px; padding-top:6px;">
            ${listHtml}
          </div>
        </div>
      `;
    }

    function playFromPeruList(index) {
      const station = peruStationList[index];
      if (!station) return;
      maybePlayPreRoll(() => {
        document.getElementById('playerTitle').textContent = `▶ Reproduciendo: ${station.name}`;
        const mediaSpace = document.getElementById('mediaSpace');
        const errorBox = document.getElementById('errorBox');
        mediaSpace.innerHTML = `
          <div class="audio-wrapper">
            <p style="color: #cbd5e1; font-size: 0.85rem; margin-bottom: 10px;">${station.name}</p>
            <audio id="audioEl" controls autoplay>
              <source src="${station.url_resolved}">
            </audio>
            <button onclick="showPeruRadioList()" style="margin-top:12px; background:transparent; border:1px solid rgba(255,255,255,0.15); color:#94a3b8; border-radius:8px; padding:6px 12px; font-size:0.75rem; cursor:pointer;">← Volver a la lista</button>
          </div>
        `;
        const audioEl = document.getElementById('audioEl');
        activeStreamAudio = audioEl;
        scheduleAdRotation();
        audioEl.addEventListener('error', () => {
          errorBox.style.display = 'block';
          errorBox.innerHTML = `Esa emisora no respondió ahora mismo. Probá otra de la lista.`;
        });
      });
    }

    /**
     * Busca una emisora real y vigente vía Radio-Browser API y la reproduce.
     * @param {string} searchName - nombre para buscar en Radio-Browser (ej. "RPP").
     * @param {string} displayName - nombre a mostrar en pantalla.
     * @param {string} fallbackSiteUrl - web oficial a abrir si no se encuentra ningún stream.
     * @param {string|null} countrycode - código de país ISO para filtrar (ej. "PE"), o null para buscar sin restricción de país.
     */
    async function playViaRadioBrowser(searchName, displayName, fallbackSiteUrl, countrycode = "PE") {
      stopAll();
      document.getElementById('playerTitle').textContent = `🔎 Buscando: ${displayName}...`;
      document.getElementById('playerContainer').style.display = 'block';

      const mediaSpace = document.getElementById('mediaSpace');
      const errorBox = document.getElementById('errorBox');
      mediaSpace.innerHTML = `<div class="audio-wrapper"><p style="color:#94a3b8; font-size:0.85rem;">Consultando emisoras en vivo…</p></div>`;

      const station = await fetchStationFromRadioBrowser(searchName, countrycode);

      if (!station) {
        document.getElementById('playerTitle').textContent = `⚠ ${displayName}`;
        errorBox.style.display = 'block';
        errorBox.innerHTML = `
          No se encontró un stream en vivo para ${displayName} en este momento.
          <br><a href="${fallbackSiteUrl}" target="_blank">Abrir ${displayName} en su web oficial →</a>
        `;
        mediaSpace.innerHTML = '';
        return;
      }

      document.getElementById('playerTitle').textContent = `▶ Reproduciendo: ${station.name}`;
      maybePlayPreRoll(() => {
        mediaSpace.innerHTML = `
          <div class="audio-wrapper">
            <p style="color: #cbd5e1; font-size: 0.85rem; margin-bottom: 10px;">Stream de audio en vivo</p>
            <audio id="audioEl" controls autoplay>
              <source src="${station.url_resolved}">
            </audio>
          </div>
        `;

        const audioEl = document.getElementById('audioEl');
        activeStreamAudio = audioEl;
        scheduleAdRotation();
        audioEl.addEventListener('error', () => {
          errorBox.style.display = 'block';
          errorBox.innerHTML = `
            Ese stream no respondió (puede estar caído ahora mismo).
            <br><a href="${fallbackSiteUrl}" target="_blank">Abrir ${displayName} en su web oficial →</a>
          `;
        });
      });
    }

    /**
     * Reproduce audio o el embed oficial de Zeno.
     * @param {string} url - stream mp3/aac directo, o URL del player de Zeno.
     * @param {string} name - nombre a mostrar.
     * @param {boolean} isZenoEmbed - true si es un iframe oficial de zeno.fm/player/...
     * @param {string} fallbackSiteUrl - sitio oficial a abrir si el stream directo falla.
     */
    function playAudio(url, name, isZenoEmbed, fallbackSiteUrl) {
      stopAll();
      document.getElementById('playerTitle').textContent = `▶ Reproduciendo: ${name}`;
      document.getElementById('playerContainer').style.display = 'block';

      const mediaSpace = document.getElementById('mediaSpace');
      const errorBox = document.getElementById('errorBox');

      if (isZenoEmbed) {
        // Zeno.fm SÍ permite ser embebido en iframe (es su feature de "player embebible")
        mediaSpace.innerHTML = `
          <div class="video-frame-wrapper" style="padding-bottom: 45%;">
            <iframe src="${url}" scrolling="no" allow="autoplay"></iframe>
          </div>
        `;
        return;
      }

      mediaSpace.innerHTML = `
        <div class="audio-wrapper">
          <p style="color: #cbd5e1; font-size: 0.85rem; margin-bottom: 10px;">Stream de audio en vivo</p>
          <audio id="audioEl" controls autoplay>
            <source src="${url}" type="audio/mpeg">
          </audio>
        </div>
      `;

      const audioEl = document.getElementById('audioEl');
      audioEl.addEventListener('error', () => {
        if (fallbackSiteUrl) {
          errorBox.style.display = 'block';
          errorBox.innerHTML = `
            No se pudo cargar el stream directo (la URL puede haber cambiado).
            <br><a href="${fallbackSiteUrl}" target="_blank">Abrir ${name} en su web oficial →</a>
          `;
        }
      });
    }
  </script>
</body>
</html>
